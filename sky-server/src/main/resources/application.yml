server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      remove-abandoned: false
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://${sky.datasource.master.host}:${sky.datasource.master.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
          username: ${sky.datasource.username}
          password: ${sky.datasource.password}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          url: jdbc:mysql://${sky.datasource.slave.host}:${sky.datasource.slave.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
          username: ${sky.datasource.username}
          password: ${sky.datasource.password}
          driver-class-name: com.mysql.cj.jdbc.Driver
  

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info
      # dynamic-datasource 日志
      com.baomidou.dynamic.datasource: debug

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: liuyu
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
